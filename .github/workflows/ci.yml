name: Digital State CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate-windows:
    name: Validate (Windows)
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml

      - name: Run pytest suite
        run: python -m pytest tests/ -v --tb=short

      - name: Run PowerShell validator
        shell: pwsh
        run: |
          .\scripts\validate-final.ps1

  validate-linux:
    name: Validate (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml

      - name: Run pytest suite (Linux, skip Hermes smoke tests)
        run: python -m pytest tests/ -v --tb=short -k "not smoke_hermes"

      - name: Run structural validator (Linux)
        run: python scripts/validate_structural.py

  smoke-test:
    name: Smoke Tests (requires Hermes)
    runs-on: windows-latest
    timeout-minutes: 10
    if: false  # Disabled by default - enable when Hermes available in CI
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Hermes
        run: |
          echo "Hermes installation not yet automated in CI"
          exit 0

      - name: Run smoke tests
        run: python -m pytest tests/test_smoke_hermes_cli.py -v --tb=short