name: Governance CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Run Governance Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install "cryptography>=41.0.0" "pytest>=9.1.1"

      - name: Verify imports
        run: |
          cd ${{ github.workspace }}
          python -c "import sys; sys.path.insert(0,'src'); sys.path.insert(0,'.'); from kernel.engine import GovernanceKernel; from integrations.hermes.client import HermesClient; print('All imports OK')"

      - name: Run test suite
        run: python -m pytest tests/ -v --tb=long -W default
        working-directory: ${{ github.workspace }}
