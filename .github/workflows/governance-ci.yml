name: Governance CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Run Governance Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # tag: v4

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # tag: v5
        with:
          python-version: "3.11"

      - name: Install dependencies & package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install "cryptography>=41.0.0" "pytest>=9.1.1"

      - name: Run test suite
        run: python -m pytest tests/ -v --tb=long -W default 2>&1 | tee test-output.txt
        working-directory: ${{ github.workspace }}

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # tag: v4
        with:
          name: test-output
          path: test-output.txt
