name: Automated Release & PyPI Publication

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-and-verify:
    name: Build & Verify Production Package Artifacts
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.get_version.outputs.version }}
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # tag: v4

      - name: Extract Release Version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building Digital State version ${VERSION}"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # tag: v5
        with:
          python-version: '3.11'

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build hatchling cryptography PyYAML pytest

      - name: Build Wheel & Source Distribution
        run: |
          python -m build

      - name: Verify Artifact Creation
        run: |
          ls -la dist/
          test -f dist/*.whl
          test -f dist/*.tar.gz

      - name: Generate Hashes for SLSA Provenance
        id: hash
        run: |
          cd dist
          echo "hashes=$(sha256sum * | base64 -w0)" >> $GITHUB_OUTPUT

      - name: Clean Environment Artifact Verification (Wheel & Sdist)
        run: |
          # 1. Verify Wheel Package in Clean Venv
          python -m venv .clean_wheel_venv
          .clean_wheel_venv/bin/pip install dist/*.whl
          .clean_wheel_venv/bin/python -m digital_state.cli.cli version
          .clean_wheel_venv/bin/python -m digital_state.cli.cli install
          .clean_wheel_venv/bin/python -m digital_state.cli.cli doctor

          # 2. Verify Source Distribution in Clean Venv
          python -m venv .clean_sdist_venv
          .clean_sdist_venv/bin/pip install dist/*.tar.gz
          .clean_sdist_venv/bin/python -m digital_state.cli.cli version
          .clean_sdist_venv/bin/python -m digital_state.cli.cli install
          .clean_sdist_venv/bin/python -m digital_state.cli.cli doctor

      - name: Run Test Suite
        run: |
          python -m pip install -e .
          pytest tests/ -v

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # tag: v4
        with:
          name: release-dist-${{ steps.get_version.outputs.version }}
          path: dist/

  publish-github-release:
    name: Publish GitHub Release
    needs: build-and-verify
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # tag: v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # tag: v4
        with:
          name: release-dist-${{ needs.build-and-verify.outputs.release_version }}
          path: dist/

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0.17.9
        with:
          path: .
          format: spdx-json
          output-file: dist/sbom.spdx.json

      - name: Sigstore Keyless Signing (Sigstore & Cosign)
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: |
            dist/*.whl
            dist/*.tar.gz

      - name: Generate SHA256 Checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # tag: v2
        with:
          name: Digital State v${{ needs.build-and-verify.outputs.release_version }}
          draft: false
          prerelease: false
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.sig
            dist/*.bundle
            dist/sbom.spdx.json
            dist/SHA256SUMS.txt
            README.md
            docs/INSTALLATION_GUIDE.md
            RELEASE_NOTES.md
            RELEASE_CERTIFICATION_REPORT.md

  slsa-provenance:
    name: Generate SLSA Provenance Attestations
    needs: [build-and-verify]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: "${{ needs.build-and-verify.outputs.hashes }}"
      upload-assets: true

  publish-pypi:
    name: Publish Package to PyPI
    needs: [build-and-verify, publish-github-release, slsa-provenance]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/p/digital-state
    permissions:
      id-token: write
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # tag: v4
        with:
          name: release-dist-${{ needs.build-and-verify.outputs.release_version }}
          path: dist/

      - name: Publish Package to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # tag: release/v1
        with:
          skip-existing: true
