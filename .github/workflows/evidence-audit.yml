name: Evidence Governance & Automated Audit

on:
  push:
    branches:
      - main
      - 'feature/*'
      - 'release/*'
  pull_request:
    branches:
      - main

jobs:
  evidence-audit:
    name: Automated Evidence Audit & Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies & Package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-cov

      - name: Run Full Pytest Suite
        run: |
          pytest tests/

      - name: Execute Automated Evidence Governance Check
        run: |
          digitalstate audit-evidence --check --all --federated --format json > evidence_manifest_ci.json


      - name: Upload Evidence Manifest Artifact
        uses: actions/upload-artifact@v4
        with:
          name: evidence-manifest-${{ matrix.os }}-py${{ matrix.python-version }}
          path: evidence_manifest_ci.json
